name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  testes:
    name: Testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar testes com cobertura
        run: pytest --cov=src --cov-report=xml --cov-report=term tests/

      - name: Salvar relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-cobertura
          path: coverage.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: testes
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependências de build
        run: pip install build

      - name: Gerar pacote .whl
        run: python -m build --wheel

      - name: Salvar pacote
        uses: actions/upload-artifact@v4
        with:
          name: pacote-whl
          path: dist/*.whl

  notificacao:
    name: Notificação
    runs-on: ubuntu-latest
    needs: testes
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Enviar notificação por e-mail
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          PIPELINE_STATUS: ${{ needs.testes.result }}
        run: python scripts/notificar.py

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Baixar pacote .whl
        uses: actions/download-artifact@v4
        with:
          name: pacote-whl
          path: dist/

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "Release v1.0.0"
          files: dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
